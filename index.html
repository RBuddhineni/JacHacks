<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="OpenAEye — camera-first assistance for safer navigation." />
  <title>OpenAEye</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: system-ui, -apple-system, sans-serif;
      background: #020817;
      color: #e2e8f0;
      text-align: center;
      line-height: 1.6;
    }
    a { color: #38bdf8; }
  </style>
</head>
<body>
  <div>
    <h1 style="font-size: 1.5rem; margin-bottom: 0.75rem;">OpenAEye</h1>
    <p style="max-width: 28rem; margin: 0 auto 1rem; color: #94a3b8;">
      The Jac client app is built with <code style="color: #cbd5e1;">jac build</code> and served via
      <code style="color: #cbd5e1;">jac start</code>. Use the <code>/app</code> route from the Jac dev server for the full UI.
    </p>
    <p style="max-width: 28rem; margin: 0 auto; font-size: 0.875rem; color: #64748b;">
      Do not embed API keys in static HTML. Configure models and keys through Jac / deployment environment.
    </p>
  </div>
</body>
</html>
