[project]
name = "relistagent"
version = "1.0.0"
description = "RelistAgent — agentic AI reselling assistant built in Jac"
entry-point = "main.jac"

[dependencies]
[dependencies.npm]
jac-client-node = "1.0.7"
"@tailwindcss/vite" = "^4.1.17"
tailwindcss = "^4.1.17"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "2.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[plugins]
[plugins.client]
[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[plugins.byllm.model]
default_model = "claude-sonnet-4-6"

[serve]
base_route_app = "app"
